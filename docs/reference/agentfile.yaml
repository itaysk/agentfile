apiVersion: agentfile.build/v1
kind: Agent
metadata:
  name: ""
  version: "" # defaults to latest
spec:
  harness:
    # mutually exclusive:
    claudecode: {}
    codex: {}
    pi: {}
  llm:
    # mutually exclusive:
    anthropic:
      model: ""
    openai:
      model: ""
    openrouter:
      model: ""
  prompt: # seed prompt
    # common sources:
    # mutually exclusive:
    text: "" # verbatim
    git: # git repository
      url: "" # git url. use `//` for in-repo path traversal
      # mutually exclusive:
      commit: "" # commit id
      ref: "" # git ref suffix
    http: # web
      url: ""
      archive: false # extract the downloaded archive
    fs: # filesystem
      # mutually exclusive:
      path: "" # relative to this file
      absolutePath: "" # absolute in the build machine filesystem
  systemPrompt:
    # common sources
  skills:
    -  # common sources
  mcps:
    - name: ""
      # mutually exclusive:
      stdio:
        command: [""] # command parts as strings array
        envs:
          - name: ""
            # mutually exclusive:
            value: "" # literal, baked into the image
            runtimeEnv: # container environment variable read at run time; required at container start
              name: ""
      http:
        url: ""
        headers:
          - name: ""
            # mutually exclusive:
            value: "" # literal, baked into the image
            runtimeEnv: # container environment variable read at run time; required at container start
              name: ""
  envs:
    - name: ""
      # mutually exclusive:
      value: "" # literal, baked into the image
      runtimeEnv: # container environment variable read at run time; required at container start
        name: ""
